<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>REST SPACE KL — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:   #08090b;
  --dark:  #0d0f13;
  --card:  #13161b;
  --rim:   #1e2229;
  --green: #00e87a;
  --gdim:  rgba(0,232,122,.1);
  --amber: #ffb340;
  --adim:  rgba(255,179,64,.1);
  --white: #eef0f3;
  --mid:   #6b7480;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── STARS ── */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; background: #fff; border-radius: 50%; animation: tw var(--d,3s) ease-in-out infinite; }
@keyframes tw { 0%,100%{opacity:.08} 50%{opacity:.5} }

/* ── LANDING PAGE ── */
#landing {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 40px 20px 60px;
}

.logo {
  font-size: 13px; font-weight: 700; letter-spacing: .18em;
  color: var(--mid); margin-bottom: 40px;
}
.logo span { color: var(--green); }

.headline {
  font-size: clamp(28px, 6vw, 40px);
  font-weight: 900; letter-spacing: -1px;
  text-align: center; line-height: 1.15;
  margin-bottom: 10px;
}
.headline em { color: var(--green); font-style: normal; }

.subline {
  font-size: 14px; color: var(--mid); text-align: center;
  margin-bottom: 48px; line-height: 1.6;
}

/* ── QR CARDS ── */
.cards {
  display: flex; gap: 16px; width: 100%; max-width: 600px;
  flex-wrap: wrap; justify-content: center;
}

.qr-card {
  flex: 1; min-width: 240px; max-width: 280px;
  border-radius: 22px; overflow: hidden;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.qr-card:hover { transform: translateY(-4px); }
.qr-card:active { transform: scale(.97); }

.qr-card.guest { box-shadow: 0 0 40px rgba(0,232,122,.15), 0 8px 32px rgba(0,0,0,.4); }
.qr-card.admin { box-shadow: 0 0 40px rgba(255,179,64,.12), 0 8px 32px rgba(0,0,0,.4); }

.qrc-header {
  padding: 18px 18px 14px;
  display: flex; align-items: center; gap: 12px;
}
.guest .qrc-header { background: linear-gradient(135deg, #0a1a0f, #0f2518); border-bottom: 1px solid rgba(0,232,122,.15); }
.admin .qrc-header { background: linear-gradient(135deg, #1a1400, #241c00); border-bottom: 1px solid rgba(255,179,64,.15); }

.qrc-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.guest .qrc-icon { background: rgba(0,232,122,.15); }
.admin .qrc-icon { background: rgba(255,179,64,.12); }

.qrc-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; }
.guest .qrc-label { color: var(--green); }
.admin .qrc-label { color: var(--amber); }
.qrc-name { font-size: 16px; font-weight: 800; margin-top: 2px; }

.qrc-body {
  background: var(--card);
  padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 14px;
}

.qrc-frame {
  background: #fff; padding: 10px; border-radius: 14px;
}
.guest .qrc-frame { box-shadow: 0 0 20px rgba(0,232,122,.2); }
.admin .qrc-frame { box-shadow: 0 0 20px rgba(255,179,64,.15); }

.qrc-hint {
  font-size: 11px; color: var(--mid); text-align: center; line-height: 1.5;
}

.qrc-btn {
  width: 100%; padding: 12px;
  border: none; border-radius: 12px;
  font-size: 13px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  transition: opacity .15s;
}
.qrc-btn:active { opacity: .85; }
.guest .qrc-btn { background: var(--green); color: #000; }
.admin .qrc-btn { background: var(--amber); color: #000; }

/* ── APP VIEWER (fullscreen overlay) ── */
#viewer {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  flex-direction: column;
  background: #000;
}
#viewer.show { display: flex; }

.viewer-topbar {
  height: 48px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  background: #111;
  border-bottom: 1px solid #222;
}
.vt-title { font-size: 13px; font-weight: 700; }
.vt-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: #222; border: none; color: var(--white);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.vt-close:hover { background: #333; }

#appFrame {
  flex: 1; border: none; width: 100%; height: 100%;
}

/* ── BOTTOM NOTE ── */
.bottom-note {
  margin-top: 48px; text-align: center;
  font-size: 12px; color: var(--mid); line-height: 1.7;
}
.bnote-highlight {
  display: inline-block;
  background: var(--gdim); border: 1px solid rgba(0,232,122,.2);
  color: var(--green); font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 100px; margin-bottom: 8px;
}

/* ── SCAN RIPPLE ANIMATION ON CARD TAP ── */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,.2);
  animation: rpl .5s ease-out forwards;
  pointer-events: none;
}
@keyframes rpl { from{transform:scale(0);opacity:1} to{transform:scale(4);opacity:0} }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- LANDING -->
<div id="landing">
  <div class="logo">REST <span>SPACE</span> KL — DEMO</div>

  <div class="headline">
    スキャンして<br><em>アプリを体験</em>
  </div>
  <div class="subline">
    QRコードをスキャン、またはボタンをタップ<br>
    ブラウザがそのままアプリとして動きます
  </div>

  <div class="cards">

    <!-- GUEST -->
    <div class="qr-card guest" onclick="openApp('guest', event)">
      <div class="qrc-header">
        <div class="qrc-icon">🛋️</div>
        <div>
          <div class="qrc-label">GUEST APP</div>
          <div class="qrc-name">客用アプリ</div>
        </div>
      </div>
      <div class="qrc-body">
        <div class="qrc-frame">
          <div id="qr-guest"></div>
        </div>
        <div class="qrc-hint">
          スマホカメラでスキャン<br>または下のボタンをタップ
        </div>
        <button class="qrc-btn" onclick="openApp('guest', event)">
          📲 アプリを開く
        </button>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="qr-card admin" onclick="openApp('admin', event)">
      <div class="qrc-header">
        <div class="qrc-icon">⚙️</div>
        <div>
          <div class="qrc-label">ADMIN — 管理者専用</div>
          <div class="qrc-name">管理ダッシュ</div>
        </div>
      </div>
      <div class="qrc-body">
        <div class="qrc-frame">
          <div id="qr-admin"></div>
        </div>
        <div class="qrc-hint">
          スタッフ・管理者用<br>スキャンまたはタップで確認
        </div>
        <button class="qrc-btn" onclick="openApp('admin', event)">
          ⚙️ 管理画面を開く
        </button>
      </div>
    </div>

  </div>

  <div class="bottom-note">
    <div class="bnote-highlight">📱 スマホ最適化済み</div><br>
    5言語対応（EN · 日本語 · BM · 中文 · عربي）<br>
    デモ版 — 実際のチェックイン処理は行いません
  </div>
</div>

<!-- FULLSCREEN VIEWER -->
<div id="viewer">
  <div class="viewer-topbar">
    <div class="vt-title" id="viewerTitle">REST SPACE</div>
    <button class="vt-close" onclick="closeApp()">✕</button>
  </div>
  <iframe id="appFrame" src="about:blank" allow="camera"></iframe>
</div>

<script>
// ── Stars ───────────────────────────────────────
const starsEl = document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*1.8+.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── App URLs (same domain, sibling files) ────────
// These files need to be in the same folder when served
const APPS = {
  guest: { file: 'guest_app_v3.html', title: '🛋️ 客用アプリ — Guest App' },
  admin: { file: 'admin_app_v3.html', title: '⚙️ 管理者ダッシュボード' }
};

// ── QR Generation ────────────────────────────────
function makeQR(elId, url, size) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  new QRCode(el, {
    text: url,
    width: size, height: size,
    colorDark: '#0d1117',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

// Build absolute URLs for QR codes
const base = window.location.href.replace(/\/[^/]*$/, '/');
makeQR('qr-guest', base + APPS.guest.file, 150);
makeQR('qr-admin', base + APPS.admin.file, 150);

// ── Open App in fullscreen iframe ────────────────
function openApp(name, e) {
  if(e) e.stopPropagation();
  const app = APPS[name];
  document.getElementById('viewerTitle').textContent = app.title;
  document.getElementById('appFrame').src = app.file;
  const viewer = document.getElementById('viewer');
  viewer.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeApp() {
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('appFrame').src = 'about:blank';
  document.body.style.overflow = '';
}

// Close on Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeApp(); });
</script>
</body>
</html>
